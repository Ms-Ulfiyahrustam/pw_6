<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>Slicing Design & Data - 24.11.6168</title>
  </head>
  <body class="page-body">
    <header class="header-section">
      <h1 class="header-title">Tailwind CSS made by ulfi</h1>
    </header>

    <main class="main-content">
      <section class="hero-card">
        <div class="hero-text-area">
          <h2 class="hero-heading">
            learning to <br />
            Development
          </h2>
          <button class="btn-try">Try It Free</button>
        </div>
        <div class="hero-image-area">
          <img src="download (24).jpeg" alt="Ilustrasi" class="hero-image" />
        </div>
      </section>

      <section class="data-section">
        <div class="card-container">
          <h3 class="section-subtitle">Tambah Arsitektur Baru</h3>
          <form class="custom-form">
            <div class="form-group">
              <label class="form-label">Nama Proyek</label>
              <input
                type="text"
                class="form-input"
                placeholder="Misal: YUKI v2.0"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Kategori Teknologi</label>
              <select class="form-input">
                <option>Generative AI (RAG)</option>
                <option>Data Science / Forecasting</option>
                <option>C# .NET App</option>
              </select>
            </div>
            <button type="submit" class="btn-submit">Simpan Konfigurasi</button>
          </form>
        </div>

        <div class="card-container flex-col">
          <h3 class="section-subtitle">Status My Proyek</h3>
          <div class="table-responsive">
            <table class="custom-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nama Proyek</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Sistem Prediksi Panen (BPS)</td>
                  <td><span class="badge-active">Deployed</span></td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>EcoLife Tracker</td>
                  <td><span class="badge-dev">Development</span></td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Chatbot RAG Engine</td>
                  <td><span class="badge-active">Deployed</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer-section">
      <div class="max-w-5xl mx-auto space-y-4">
        <p>A student just learning</p>
      </div>
    </footer>
  </body>
</html>
